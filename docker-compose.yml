services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/12345678
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  seed:
    build: .
    command: python seed_data.py
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=12345678

  web:
    build: .
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=12345678
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  neo4j_data:
  redis_data:
