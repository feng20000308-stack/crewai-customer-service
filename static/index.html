<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .chat-container { width: 420px; height: 600px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 16px; font-weight: 600; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }
        .header-btn:hover { background: rgba(255,255,255,0.3); }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
        .msg.user { align-self: flex-end; background: #667eea; color: #fff; border-bottom-right-radius: 4px; }
        .msg.bot { align-self: flex-start; background: #f0f2f5; color: #333; border-bottom-left-radius: 4px; }
        .msg.bot.loading { color: #999; }
        .input-area { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
        .input-area input { flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 10px 16px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #667eea; }
        .input-area button { background: #667eea; color: #fff; border: none; border-radius: 24px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
        .input-area button:hover { background: #5a6fd6; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <span class="header-title">智能客服</span>
            <button class="header-btn" onclick="clearChat()">清空对话</button>
        </div>
        <div class="messages" id="messages">
            <div class="msg bot">你好！我是智能客服，可以帮你查产品、查订单、处理售后。请问有什么可以帮您？</div>
        </div>
        <div class="input-area">
            <input id="input" placeholder="输入消息..." autocomplete="off" />
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const messages = document.getElementById("messages");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("sendBtn");
        const sessionId = "session_" + Math.random().toString(36).slice(2, 10);

        input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, "user");
            input.value = "";
            sendBtn.disabled = true;

            const loading = addMsg("正在思考...", "bot loading");

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });
                const data = await res.json();
                loading.remove();
                addMsg(data.reply, "bot");
            } catch (e) {
                loading.remove();
                addMsg("请求失败，请重试", "bot");
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function addMsg(text, cls) {
            const div = document.createElement("div");
            div.className = `msg ${cls}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        async function clearChat() {
            await fetch("/api/clear", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "", session_id: sessionId })
            });
            messages.innerHTML = '<div class="msg bot">对话已清空，有什么可以帮您？</div>';
        }
    </script>
</body>
</html>
